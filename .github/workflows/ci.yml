# =============================================================================
# CI Workflow — includes DB migration approval gate before production deploy.
#
# REQUIRED EXTERNAL SETUP (one-time, done by repo owner in GitHub + VPS):
#
# GitHub Environments:
#   deployment  (existing) — Cloudflare deploy secrets + SSH/Tailscale secrets
#   db-migrations (NEW)    — Required reviewers: repo owners; branch: main only
#
# Secrets to add to the 'deployment' environment:
#   SSH_KNOWN_HOSTS      — output of: ssh-keyscan -H <vps-tailscale-host>
#   SSH_PRIVATE_KEY      — PEM body of a CI-only key accepted by the VPS
#   SSH_HOST             — Tailscale hostname or IP of the VPS
#   SSH_USERNAME         — SSH user with rights to run the infra scripts
#   TS_OAUTH_CLIENT_ID   — Tailscale OAuth client ID (login.tailscale.com/admin/settings/oauth)
#   TS_OAUTH_SECRET      — Tailscale OAuth client secret
#
# Also add the same SSH_* and TS_OAUTH_* secrets to the 'db-migrations'
# environment (or promote them to repo-level secrets).
#
# Remote scripts on the VPS (user-owned, not managed by this repo):
#   /root/grainy/infra/scripts/check-migrations.sh <commit-hash>
#     → exit 0 = no pending migrations
#     → exit 1 = pending migrations exist (triggers approval gate)
#     → exit >1 = error (fails the workflow)
#   /root/grainy/infra/scripts/deploy-prod.sh <commit-hash>
#     → applies pending DB migrations (DB only; Worker is deployed by wrangler)
#
# See .sisyphus/plans/migration-approval-gate.md for full details.
# =============================================================================
name: CI

on:
  push:
  pull_request:

# Workflow-level concurrency: cancel in-progress runs on non-main branches to save CI minutes.
# Note: the deploy lane (detect-migrations, apply-migrations, deploy) has its own 'deploy-prod'
# concurrency group (cancel-in-progress: false) to prevent overlapping migration applies on main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  format:
    name: Format (prettier)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26.3.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26.3.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck (tsc + opennext build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26.3.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            .open-next
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}', 'next.config.ts', 'open-next.config.ts') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - run: pnpm cf-typegen
      - run: pnpm exec opennextjs-cloudflare build
      - run: pnpm typecheck

  detect-migrations:
    name: Detect pending DB migrations
    needs: [format, lint, typecheck]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: deployment
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    permissions:
      contents: read
    outputs:
      has-pending: ${{ steps.check.outputs.has-pending }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Tailscale (ephemeral CI node)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Trust SSH host
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
      - name: Check for pending migrations
        id: check
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          set +e
          ssh -o BatchMode=yes "${SSH_USERNAME}@${SSH_HOST}" \
            "/root/grainy/infra/scripts/check-migrations.sh '${COMMIT_SHA}'"
          rc=$?
          set -e
          case "${rc}" in
            0)
              echo "No pending migrations."
              echo "has-pending=false" >> "${GITHUB_OUTPUT}"
              echo "### Migration check: ✅ no pending migrations" >> "${GITHUB_STEP_SUMMARY}"
              ;;
            1)
              echo "Pending migrations detected; approval required."
              echo "has-pending=true" >> "${GITHUB_OUTPUT}"
              echo "### Migration check: ⏸ pending migrations — approval required" >> "${GITHUB_STEP_SUMMARY}"
              ;;
            *)
              echo "::error::check-migrations.sh exited with ${rc}; treating as failure."
              echo "### Migration check: ❌ error (exit ${rc})" >> "${GITHUB_STEP_SUMMARY}"
              exit "${rc}"
              ;;
          esac

  apply-migrations:
    name: Apply DB migrations (requires owner approval)
    needs: [detect-migrations]
    if: ${{ needs.detect-migrations.outputs.has-pending == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: db-migrations
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Set up Tailscale (ephemeral CI node)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Trust SSH host
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
      - name: Apply migrations via deploy-prod.sh
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes "${SSH_USERNAME}@${SSH_HOST}" \
            "/root/grainy/infra/scripts/deploy-prod.sh '${COMMIT_SHA}'"
          echo "### Migrations applied for ${COMMIT_SHA}" >> "${GITHUB_STEP_SUMMARY}"

  deploy:
    name: Deploy to Cloudflare Workers
    needs: [format, lint, typecheck, detect-migrations, apply-migrations]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-migrations.result == 'success' && (needs.apply-migrations.result == 'success' || needs.apply-migrations.result == 'skipped') }}
    environment:
      name: deployment
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26.3.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            .open-next
          key: nextjs-deploy-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}', 'next.config.ts', 'open-next.config.ts') }}
          restore-keys: |
            nextjs-deploy-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - run: pnpm cf-typegen
      - name: Deploy via OpenNext + Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SKIP_ENV_VALIDATION: "true"
        run: pnpm run deploy
